<!doctype html>

<html lang="tr">

  <head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Doc Assistant</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link

      rel="stylesheet"

      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"

    />

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>

      /* Kaydırma çubuğu özelleştirme */

      ::-webkit-scrollbar {

        width: 8px;

      }

      ::-webkit-scrollbar-track {

        background: #1a1a2e;

      }

      ::-webkit-scrollbar-thumb {

        background: #4a4a6a;

        border-radius: 10px;

      }

    </style>

  </head>

  <body

    class="bg-[#121212] text-gray-300 font-sans h-screen flex overflow-hidden"

  >

    <aside class="w-80 bg-[#1e1e2f] border-r border-gray-800 flex flex-col p-6">

      <h1 class="text-xl font-bold text-purple-400">Doc Assistant</h1>

      <p class="text-xs text-gray-500 mb-8">AI-Powered Document Analysis</p>



      <button

        id="upload-btn"

        class="w-full bg-[#5b36d6] hover:bg-[#4a2bb3] text-white py-3 rounded-xl font-semibold mb-8 transition-all active:scale-95"

      >

        Upload Document

      </button>



      <input type="file" id="file-input" class="hidden" accept=".pdf,.txt" />



      <div class="space-y-4 overflow-y-auto">

        <h2

          class="text-xs font-semibold text-gray-500 uppercase tracking-wider"

        >

           Documents

        </h2>

        <div id="dokuman-listesi" class="space-y-3"></div>

      </div>

    </aside>



    <main class="flex-1 flex flex-col bg-[#121212] relative">

      <header class="p-4 border-b border-gray-800 bg-[#1e1e2f]/50 backdrop-blur-md flex items-center justify-between gap-4">

  <div class="flex items-center gap-3">

    <span class="w-2.5 h-2.5 bg-purple-500 rounded-full animate-pulse shrink-0"></span>

    <h2 id="selected-doc-name" class="text-sm font-medium text-white truncate max-w-sm">

      Select a document.

    </div>

    

  </div>


    <button class="text-gray-600 hover:text-gray-300 transition-all">

      <i class="fas fa-ellipsis-h text-xl"></i>

    </button>

  </div>

</header>

      <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4">

        <div

          class="bg-[#1e1e2f] p-4 rounded-2xl max-w-[40%] self-start border border-gray-800"

        >

          <p class="text-sm">

           Hello! I’m Doc Assistant. You can ask me anything about the documents you’ve uploaded. 🚀
Please select a document...
          </p>

        </div>

      </div>

      <footer class="p-6 bg-[#121212]">

        <div class="relative max-w-4xl mx-auto">

          <textarea

            id="user-input"

            rows="3"

            placeholder="Write your message"

            class="w-full bg-[#1e1e2f] text-white p-4 pr-16 rounded-2xl border border-gray-800 focus:border-purple-500 focus:outline-none resize-none transition-all"

          ></textarea>

          <button

            id="send-btn"

            class="absolute right-3 top-1/2 -translate-y-1/2 bg-[#5b36d6] hover:bg-[#4a2bb3] text-white p-2.5 rounded-xl transition-all actibve:scale-95"

          >

            <i class="fas fa-paper-plane"></i>

          </button>

        </div>

      </footer>

    </main>



    <script src="./app.js"></script>

  </body>

</html>
