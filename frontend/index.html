<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doc Assistant | AI Document Analyzer</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
      /* Profesyonel Kaydırma Çubuğu */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #121212; }
      ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }

      /* Markdown & Kod Bloğu Stilleri */
      .markdown-body { color: #d1d5db; line-height: 1.6; font-size: 14px; }
      .markdown-body p { margin-bottom: 12px; }
      .markdown-body pre { 
          background: #1a1a2e !important; 
          padding: 16px; 
          border-radius: 12px; 
          border: 1px solid #374151; 
          margin: 15px 0;
          overflow-x: auto;
      }
      .markdown-body code { font-family: 'Fira Code', monospace; color: #f472b6; font-size: 0.9em; }
      .markdown-body ul { list-style-type: disc; margin-left: 20px; margin-bottom: 12px; }
      
      .animate-fade-in { animation: fadeIn 0.3s ease-in; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  </head>
  <body class="bg-[#121212] text-gray-300 font-sans h-screen flex overflow-hidden">

    <aside class="w-80 bg-[#1e1e2f] border-r border-gray-800 flex flex-col p-6">
      <div class="mb-8">
        <h1 class="text-xl font-bold text-purple-400">Doc Assistant</h1>
        <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">AI Destekli Analiz Sistemi</p>
      </div>

      <button id="upload-btn" class="w-full bg-[#5b36d6] hover:bg-[#4a2bb3] text-white py-3 rounded-xl font-semibold mb-8 transition-all active:scale-95 shadow-lg shadow-purple-900/20">
        <i class="fas fa-plus mr-2"></i> Doküman Yükle
      </button>

      <input type="file" id="file-input" class="hidden" accept=".pdf,.txt" />

      <div class="flex-1 overflow-y-auto">
        <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Kütüphanem</h2>
        <div id="dokuman-listesi" class="space-y-3">
            </div>
      </div>
    </aside>

    <main class="flex-1 flex flex-col bg-[#121212] relative">
      
      <header class="p-4 border-b border-gray-800 bg-[#1e1e2f]/50 backdrop-blur-md flex items-center justify-between">
        <div class="flex flex-col">
            <div class="flex items-center gap-3">
                <span class="w-2.5 h-2.5 bg-purple-500 rounded-full animate-pulse"></span>
                <h2 id="selected-doc-name" class="text-sm font-medium text-white truncate max-w-sm">Bir doküman seçiniz..</h2>
            </div>
            <div id="quick-actions" class="hidden flex gap-2 mt-2 animate-fade-in">
                <button onclick="hızlıAksiyon('ozet')" class="text-[10px] bg-gray-800 hover:bg-purple-900/50 text-gray-400 hover:text-purple-300 px-3 py-1 rounded-lg border border-gray-700 transition-all">
                    <i class="fas fa-magic mr-1"></i> Özetle
                </button>
                <button onclick="hızlıAksiyon('anahtar')" class="text-[10px] bg-gray-800 hover:bg-blue-900/50 text-gray-400 hover:text-blue-300 px-3 py-1 rounded-lg border border-gray-700 transition-all">
                    <i class="fas fa-key mr-1"></i> Terimler
                </button>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="relative w-64">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-600 text-xs"></i>
                <input type="text" placeholder="Dokümanlarda ara..." class="w-full bg-[#121212] text-xs text-white p-2.5 pl-9 rounded-xl border border-gray-800 focus:border-purple-500 focus:outline-none transition-all" />
            </div>
        </div>
      </header>

      <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-6">
        <div class="bg-[#1e1e2f] p-5 rounded-2xl max-w-[50%] self-start border border-gray-800 shadow-xl">
          <p class="text-sm leading-relaxed">
            Merhaba Emine! Ben Doc Assistant. Analiz etmemi istediğin dökümanı soldan seçip bana her şeyi sorabilirsin. 🚀
          </p>
        </div>
      </div>

      <footer class="p-6 bg-[#121212] border-t border-gray-900">
        <div class="relative max-w-4xl mx-auto">
          <textarea id="user-input" rows="1" placeholder="Dokümana dair bir soru sor..." 
            class="w-full bg-[#1e1e2f] text-white p-4 pr-16 rounded-2xl border border-gray-800 focus:border-purple-500 focus:outline-none resize-none transition-all shadow-2xl"></textarea>
          <button id="send-btn" class="absolute right-3 top-1/2 -translate-y-1/2 bg-[#5b36d6] hover:bg-[#4a2bb3] text-white p-2.5 rounded-xl transition-all active:scale-90">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </footer>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
