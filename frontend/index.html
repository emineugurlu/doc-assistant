<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /*Kaydırma çubuğu özelleştirme*/
        ::-webkit-scrollbar{
            width: 8px;
        }
        ::-webkit-scrollbar-track{
            background: #1a1a2e;
        }
        ::-webkit-scrollbar-thumb { 
            background: #4a4a6a; 
            border-radius: 10px; 
        }
    </style>
</head>
<body class="bg-[#121212] text-gray-300 font-sans h-screen flex overflow-hidden">
    <aside class="w-80 bg-[#1e1e2f] border-r border-gray-800 flex flex-col p-6">
        <h1 class="text-xl font-bold text-purple-400">Doc Assistant</h1>
        <p class="text-xs text-gray-500 mb-8">AI Destekli Dokuman Analizi</p>
    </aside>
</body>
</html>
